server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Pure static SPA server. API / SSE routing is owned by the gateway reverse proxy
  # (nginx/nginx.conf), which routes /api and /sse to the backend and everything else here.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
