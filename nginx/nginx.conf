# fa.reel — Gateway Reverse Proxy (dev/local compose; envsubst template)
# Single public entry point: routes /api and /sse traffic to the backend,
# everything else to the frontend SPA.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    upstream backend_upstream {
        server backend:${NGINX_BACKEND_PORT};
    }

    upstream frontend_upstream {
        server frontend:${NGINX_FRONTEND_PORT};
    }

    server {
        listen 80;
        server_name _;

        # --- Backend API routes ---

        location /api/ {
            proxy_pass http://backend_upstream/api/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Cloudflare provides the country code in prod; forward it for the geo-IP
            # region default at signup.
            proxy_set_header CF-IPCountry $http_cf_ipcountry;
            client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE};
        }

        # SSE streams — disable buffering for the pipeline/onboarding event channel
        location /sse/ {
            proxy_pass http://backend_upstream/sse/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        # Health check passthrough (the API maps /health)
        location /health {
            proxy_pass http://backend_upstream/health;
        }

        # --- Frontend (SPA) — catch-all ---

        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
