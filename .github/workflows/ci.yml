name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================================
  # Backend — lint, build, test (.NET 10)
  # ============================================================================
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./src/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/backend/**/*.csproj', '*.slnx') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ../../fa.reel.slnx

      - name: Lint (format check)
        run: dotnet format ../../fa.reel.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build ../../fa.reel.slnx --nologo -v q --no-restore

      - name: Test with coverage
        run: dotnet test FrostAura.Reel.Tests/FrostAura.Reel.Tests.csproj --nologo -v q --settings coverlet.runsettings --results-directory ./TestResults

      - name: Enforce coverage threshold
        run: |
          # Baseline ratchet — set to current measured backend line coverage (~11% after the
          # M3 surface landed; pure logic is tested, endpoint/handler suites raise this in M4
          # hardening). A regression guard, not a target.
          THRESHOLD=10
          REPORT=$(find ./TestResults -name "coverage.cobertura.xml" | head -1)
          if [ -z "$REPORT" ]; then
            echo "No Cobertura coverage report found"
            exit 1
          fi
          echo "Parsing: $REPORT"
          line_rate=$(grep -oP 'line-rate="\K[^"]+' "$REPORT" | head -1)
          if [ -z "$line_rate" ]; then
            echo "Could not parse line-rate from report"
            exit 1
          fi
          coverage=$(awk "BEGIN {printf \"%.1f\", $line_rate * 100}")
          echo "Line coverage: ${coverage}%  (threshold ${THRESHOLD}%)"
          if [ "$(awk "BEGIN {print ($coverage < $THRESHOLD)}")" -eq 1 ]; then
            echo "Coverage ${coverage}% is below the ${THRESHOLD}% threshold"
            exit 1
          fi

  # ============================================================================
  # Frontend — lint, build, test (Node 22 / React 19 / Vite)
  # ============================================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./src/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test -- --run --coverage

      - name: Enforce frontend coverage threshold
        run: |
          # Baseline guard that the test infra + coverage report stay intact (~7% after the M3
          # surface; e2e carries the UI contract). Raise as the unit suite grows.
          THRESHOLD=6
          REPORT="coverage/coverage-summary.json"
          if [ ! -f "$REPORT" ]; then
            echo "Missing coverage summary artifact at $REPORT"
            exit 1
          fi
          node -e "
            const r = require('./coverage/coverage-summary.json');
            const pct = r.total.lines.pct;
            const threshold = ${THRESHOLD};
            console.log('Line coverage: ' + pct + '%  (threshold ' + threshold + '%)');
            if (pct < threshold) process.exit(1);
          "

  # ============================================================================
  # Frontend E2E — single-shard Playwright smoke (chromium only)
  # ============================================================================
  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend]
    defaults:
      run:
        working-directory: ./src/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        timeout-minutes: 10
        run: CI=1 npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            ./src/frontend/test-results/
            ./src/frontend/playwright-report/
          retention-days: 7

  # ============================================================================
  # Security — npm audit + dotnet vulnerable package scan
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./src/frontend
        run: npm ci

      - name: npm audit (high severity)
        working-directory: ./src/frontend
        run: npm audit --audit-level=high

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend packages
        working-directory: ./src/backend
        run: dotnet restore ../../fa.reel.slnx

      - name: Check vulnerable NuGet packages
        working-directory: ./src/backend
        run: |
          set -euo pipefail
          dotnet list ../../fa.reel.slnx package --vulnerable --include-transitive --format json > vulnerable-packages.json
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('vulnerable-packages.json', 'utf8'));
            const projects = report.projects || [];
            const vulnerable = [];
            for (const project of projects) {
              for (const framework of project.frameworks || []) {
                for (const pkg of framework.topLevelPackages || []) {
                  if ((pkg.vulnerabilities || []).length > 0) vulnerable.push(pkg);
                }
                for (const pkg of framework.transitivePackages || []) {
                  if ((pkg.vulnerabilities || []).length > 0) vulnerable.push(pkg);
                }
              }
            }
            if (vulnerable.length > 0) {
              console.error('Vulnerable NuGet packages detected:');
              for (const pkg of vulnerable) {
                const ids = (pkg.vulnerabilities || []).map(v => v.severity + ':' + v.advisoryUrl).join(', ');
                console.error('- ' + pkg.id + ' ' + pkg.resolvedVersion + ' -> ' + ids);
              }
              process.exit(1);
            }
            console.log('No vulnerable NuGet packages detected');
          "

  # ============================================================================
  # Backend Integration — real Postgres (pgvector) boundary checks
  # ============================================================================
  backend-integration:
    name: Backend Integration (Postgres + pgvector)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend]
    services:
      postgres:
        # pgvector image: the vector + pg_trgm migrations must apply in CI exactly as in prod.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: reel
          POSTGRES_PASSWORD: reel_test_pw
          POSTGRES_DB: reel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./src/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore FrostAura.Reel.Tests/FrostAura.Reel.Tests.csproj

      - name: Run integration tests against Postgres
        env:
          REEL_TEST_CONNECTION_STRING: Host=localhost;Port=5432;Database=reel_test;Username=reel;Password=reel_test_pw
        run: dotnet test FrostAura.Reel.Tests/FrostAura.Reel.Tests.csproj --nologo -v q --filter "FullyQualifiedName~IntegrationTests"

  # ============================================================================
  # Docker Build & Push — only on push to main, after all CI gates pass
  # ============================================================================
  build-backend-amd64:
    name: Build Backend (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend, frontend-e2e, backend-integration, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/reel-backend:latest-amd64

  build-backend-arm64:
    name: Build Backend (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    needs: [backend, frontend, frontend-e2e, backend-integration, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/backend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/reel-backend:latest-arm64

  merge-backend-manifests:
    name: Create Backend Multi-arch Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-backend-amd64, build-backend-arm64]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create -t ${{ secrets.DOCKERHUB_USERNAME }}/reel-backend:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/reel-backend:latest-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/reel-backend:latest-arm64

  build-frontend-amd64:
    name: Build Frontend (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend, frontend-e2e, backend-integration, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/reel-frontend:latest-amd64

  build-frontend-arm64:
    name: Build Frontend (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    needs: [backend, frontend, frontend-e2e, backend-integration, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/frontend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/reel-frontend:latest-arm64

  merge-frontend-manifests:
    name: Create Frontend Multi-arch Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-frontend-amd64, build-frontend-arm64]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create -t ${{ secrets.DOCKERHUB_USERNAME }}/reel-frontend:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/reel-frontend:latest-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/reel-frontend:latest-arm64

  # ============================================================================
  # Portainer deploy — re-pull image and redeploy the live stack (fa.startup pattern)
  # ============================================================================
  # DISABLED until the reel Portainer stack exists. Re-enable by setting the
  # repository variable DEPLOY_ENABLED=true (Settings → Secrets and variables →
  # Actions → Variables) once PORTAINER_STACK_ID + the stack are in place. While
  # the variable is unset the job is skipped (not failed), so CI stays green.
  deploy-portainer:
    name: Re-pull image and redeploy on Portainer
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [merge-backend-manifests, merge-frontend-manifests]
    if: vars.DEPLOY_ENABLED == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Docker Hub image propagation
        run: |
          echo "Sleeping 30s to let Docker Hub propagate the freshly pushed manifests before Portainer pulls."
          sleep 30

      - name: Trigger Portainer re-pull and redeploy
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
        run: |
          set -euo pipefail
          : "${PORTAINER_URL:?secret PORTAINER_URL is required}"
          : "${PORTAINER_TOKEN:?secret PORTAINER_TOKEN is required}"
          : "${PORTAINER_ENDPOINT_ID:?secret PORTAINER_ENDPOINT_ID is required}"
          : "${PORTAINER_STACK_ID:?secret PORTAINER_STACK_ID is required}"

          api="${PORTAINER_URL%/}/api"

          echo "Fetching current stack file content..."
          stack_file_content=$(curl -fsSL \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${api}/stacks/${PORTAINER_STACK_ID}/file" \
            | jq -r '.StackFileContent')

          echo "Fetching current stack metadata..."
          env_array=$(curl -fsSL \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${api}/stacks/${PORTAINER_STACK_ID}" \
            | jq -c '.Env // []')

          echo "Submitting update with pullImage=true..."
          body=$(jq -n \
            --arg sfc "${stack_file_content}" \
            --argjson env "${env_array}" \
            '{stackFileContent: $sfc, env: $env, prune: false, pullImage: true}')

          http_code=$(curl -sS -o /tmp/portainer-resp.json -w "%{http_code}" \
            -X PUT "${api}/stacks/${PORTAINER_STACK_ID}?endpointId=${PORTAINER_ENDPOINT_ID}" \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${body}")

          echo "Portainer responded with HTTP ${http_code}"
          if [ "${http_code}" -ge 400 ]; then
            cat /tmp/portainer-resp.json
            exit 1
          fi
          echo "Stack ${PORTAINER_STACK_ID} redeployed successfully."
